x-airflow-common: &airflow-common
  image: apache/airflow:3.2.0
  env_file: .env

  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager

    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0

    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"

    # ✅ REQUIRED FOR AIRFLOW 3 AUTH (REAL FIX)
    AIRFLOW__API_AUTH__JWT_SECRET: airflow_jwt_secret
    AIRFLOW__API_AUTH__JWT_ISSUER: airflow

    # ✅ REQUIRED FOR INTERNAL EXECUTION API
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/

    # Connections
    AIRFLOW_CONN_POSTGRES_DWH: postgresql://dwh_user:dwh_password@postgres-dwh:5432/dwh
    AIRFLOW_CONN_MINIO_LOCAL: aws://minio_admin:minio_password_2026@?endpoint_url=http%3A%2F%2Fminio%3A9000
    AIRFLOW_CONN_MARKETPLACE_API: http://api-marketplace:5000

    _PIP_ADDITIONAL_REQUIREMENTS: >
      apache-airflow-providers-postgres
      apache-airflow-providers-amazon
      apache-airflow-providers-http
      apache-airflow-providers-celery
      boto3
      requests

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins

  networks:
    - airflow-net

services:

  postgres-airflow:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - airflow-net

  postgres-dwh:
    image: postgres:16
    environment:
      POSTGRES_USER: dwh_user
      POSTGRES_PASSWORD: dwh_password
      POSTGRES_DB: dwh
    ports:
      - "5433:5432"
    volumes:
      - postgres-dwh-data:/var/lib/postgresql/data
      - ./init-db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./init-db/dwh_tables.sql:/docker-entrypoint-initdb.d/02_dwh.sql
      - ./init-db/analytics_tables.sql:/docker-entrypoint-initdb.d/03_analytics.sql
    networks:
      - airflow-net

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airflow-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password_2026
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - airflow-net

  minio-init:
    image: minio/mc:latest
    entrypoint: /bin/sh
    command: >
      -c "sleep 10;
      mc alias set local http://minio:9000 minio_admin minio_password_2026;
      mc mb --ignore-existing local/data-lake;
      exit 0;"
    depends_on:
      - minio
    networks:
      - airflow-net

  api-marketplace:
    build: ./api
    ports:
      - "5000:5000"
    environment:
      API_TOKEN: formation-token-2026
    networks:
      - airflow-net

  # -------------------------
  # AIRFLOW INIT
  # -------------------------
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    restart: "no"
    command: >
      -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@local || true
      "

  # -------------------------
  # API SERVER (WITH HEALTHCHECK)
  # -------------------------
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres-airflow:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # -------------------------
  # SCHEDULER
  # -------------------------
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      postgres-airflow:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # -------------------------
  # DAG PROCESSOR
  # -------------------------
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      postgres-airflow:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # -------------------------
  # WORKER (CRITICAL FIX HERE)
  # -------------------------
  airflow-worker:
    <<: *airflow-common
    command: celery worker
    depends_on:
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # -------------------------
  # TRIGGERER
  # -------------------------
  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      postgres-airflow:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  streamlit:
    image: python:3.11
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt &&
              streamlit run app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit:/app
    networks:
      - airflow-net
    depends_on:
      - postgres-dwh

volumes:
  postgres-airflow-data:
  postgres-dwh-data:
  minio-data:

networks:
  airflow-net: