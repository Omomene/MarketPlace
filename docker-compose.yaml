version: "3.8"

# =============================================================================
# COMMON AIRFLOW CONFIG
# =============================================================================
x-airflow-common: &airflow-common
  image: apache/airflow:3.1.8
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__SECRET_KEY: airflow-secret-key

    # Connections
    AIRFLOW_CONN_POSTGRES_DWH: postgresql://dwh_user:dwh_password@postgres-dwh:5432/dwh
    AIRFLOW_CONN_MINIO_LOCAL: aws://minio_admin:minio_password_2026@?endpoint_url=http%3A%2F%2Fminio%3A9000&region_name=us-east-1
    AIRFLOW_CONN_MARKETPLACE_API: http://api-marketplace:5000

    # Install required packages
    _PIP_ADDITIONAL_REQUIREMENTS: >
      apache-airflow-providers-postgres
      apache-airflow-providers-amazon
      apache-airflow-providers-http
      apache-airflow-providers-celery
      boto3
      requests

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./tests:/opt/airflow/tests

  depends_on:
    postgres-airflow:
      condition: service_healthy
    redis:
      condition: service_healthy

  networks:
    - airflow-net

# =============================================================================
# SERVICES
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # PostgreSQL - Airflow Metadata
  # ---------------------------------------------------------------------------
  postgres-airflow:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airflow-net

  # ---------------------------------------------------------------------------
  # PostgreSQL - Data Warehouse
  # ---------------------------------------------------------------------------
  postgres-dwh:
    image: postgres:16
    environment:
      POSTGRES_USER: dwh_user
      POSTGRES_PASSWORD: dwh_password
      POSTGRES_DB: dwh
    ports:
      - "5433:5432"
    volumes:
      - postgres-dwh-data:/var/lib/postgresql/data
      - ./init-db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dwh_user -d dwh"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airflow-net

  # ---------------------------------------------------------------------------
  # Redis - Celery Broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    networks:
      - airflow-net

  # ---------------------------------------------------------------------------
  # MinIO - Data Lake (S3)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password_2026
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - airflow-net

  # ---------------------------------------------------------------------------
  # MinIO Init - Create bucket
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    entrypoint: /bin/sh
    command: >
      -c "sleep 5;
      mc alias set local http://minio:9000 minio_admin minio_password_2026;
      mc mb --ignore-existing local/data-lake;
      exit 0;"
    depends_on:
      - minio
    networks:
      - airflow-net

  # ---------------------------------------------------------------------------
  # API Marketplace (Flask)
  # ---------------------------------------------------------------------------
  api-marketplace:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      API_TOKEN: formation-token-2026
    networks:
      - airflow-net

  # ---------------------------------------------------------------------------
  # Airflow Init
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@local || true

  # ---------------------------------------------------------------------------
  # Airflow API Server
  # ---------------------------------------------------------------------------
  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  # ---------------------------------------------------------------------------
  # Airflow Scheduler
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

  # ---------------------------------------------------------------------------
  # Airflow Worker
  # ---------------------------------------------------------------------------
  airflow-worker:
    <<: *airflow-common
    command: celery worker
    depends_on:
      - airflow-init

  # ---------------------------------------------------------------------------
  # Airflow Triggerer
  # ---------------------------------------------------------------------------
  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      - airflow-init

  # ---------------------------------------------------------------------------
  # Airflow DAG Processor
  # ---------------------------------------------------------------------------
  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    depends_on:
      - airflow-init

  # ---------------------------------------------------------------------------
  # Metabase (BI)
  # ---------------------------------------------------------------------------
  metabase:
    image: metabase/metabase:v0.59.6.1
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      - postgres-dwh
    networks:
      - airflow-net

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres-airflow-data:
  postgres-dwh-data:
  minio-data:
  metabase-data:

# =============================================================================
# NETWORK
# =============================================================================
networks:
  airflow-net:
    driver: bridge